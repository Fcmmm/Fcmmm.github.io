name: Deploy Blog

on:
  push:
    branches:
      - source

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate & Deploy
        env:
          GIT_DEPLOY_REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Fcmmm/Fcmmm.github.io.git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          npx hexo generate
          npx hexo deploy --repo "$GIT_DEPLOY_REPO"
