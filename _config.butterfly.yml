# --------------------------------------
# Butterfly Theme Configuration
# --------------------------------------

# Navigation Settings
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  文章: / || fas fa-book
  归档: /archives/ || fas fa-box-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  休闲||fas fa-mug-hot:
    项目: /projects/ || fas fa-code
    图库: /gallery/ || fas fa-images
    音乐: /music/ || fas fa-music
  社交||fas fa-paperclip:
    友人帐: /link/ || fas fa-link
    留言板: /comments/ || fas fa-comment-dots
    关于: /about/ || fas fa-heart

# Code Blocks Settings
code_blocks:
  theme: light
  macStyle: true
  height_limit: 230
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: true

# Social media links (top-right in hero)
social:

  fas fa-envelope: mailto:1741322913@qq.com || Email || '#4a7dbe'
  fab fa-qq: https://wpa.qq.com/msgrd?v=3&uin=1741322913&site=qq&menu=yes || QQ || '#2aa7e3'
  fab fa-bilibili: https://space.bilibili.com/290674578 || B站 || '#00a4da'

# Image Settings
favicon: /img/favicon.ico

avatar:
  img: /img/avatar.jpg
  effect: true

disable_top_img: false

default_top_img:

index_img:

archive_img: http://114.215.125.28/images/covers/cover-010.jpg

tag_img:

tag_per_img:

category_img:

category_per_img:

footer_img: false

background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    # - https://picsum.photos/seed/cover/800/400

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: 'Page Not Found'
  background: /img/error-page.png

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    position: left
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true

# Index page settings
index_site_info_top:
index_top_img_height:

subtitle:
  enable: true
  effect: true
  typed_option:
  source: 1
  sub:
    - 分享技术与生活，记录学习的点点滴滴
    - Stay Hungry, Stay Foolish.
    - 代码改变世界，文字记录成长。

index_layout: 4
index_post_content:
  method: 3
  length: 500

# Post Settings
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false
  text:
  QR_code:

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false
  style: flat
  limit_day: 365
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# Footer Settings
footer:
  nav:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true
  custom_text:

# Aside Settings
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: LINK START!
    button:
      enable: true
      icon: fa fa-house
      text: 前往主页
      link: /
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！技术分享、生活记录和开发心得都会写在这里～<br><br>如果出现非正常现象，请 Ctrl+F5 强制刷新或更换 Chrome、Edge、Firefox 浏览器。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    custom_colors:
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date: '2026/05/28 00:00:00'

# Bottom right button
rightside_bottom:

translate:
  enable: true
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '簡'

readmode: true

# Dark Mode
darkmode:
  enable: true
  button: true
  autoChangeMode: 1
  start:
  end:

rightside_scroll_percent: true

rightside_item_order:
  enable: false
  hide:
  show:

rightside_config_animation: true

# Global Settings
anchor:
  auto_update: false
  click_to_scroll: false

photofigcaption: true

copy:
  enable: true
  copyright:
    enable: true
    limit_count: 150

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Math
math:
  use:
  per_page: true
  hide_scrollbar: false
  mathjax:
    enableMenu: true
    tags: none
  katex:
    copy_tex: false

# Search
search:
  use: local_search
  placeholder: 搜索文章...
  algolia_search:
    hitsPerPage: 6
  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: true
      hitsPerPage: 8
    CDN:
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# Share System
share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# Comments System
comments:
  use: Giscus
  text: true
  lazyload: false
  count: true
  card_post_count: true

# Giscus - 基于 GitHub Discussions 的评论系统（完全免费，无需服务器）
# 配置步骤见下方留言板说明，填入你的 repo 和相关 ID 即可
giscus:
  repo: Fcmmm/Fcmmm.github.io
  repo_id:  "R_kgDOSqHvlA"
  category_id:  "DIC_kwDOSqHvlM4C-AMX"
  light_theme: light
  dark_theme: dark
  option:

# Chat Services
chat:
  use:
  rightside_button: false
  button_hide_show: false

# Beautify / Effect
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

category_ui:
tag_ui:

rounded_corners_ui: true

text_align_justify: false

mask:
  header: true
  footer: true

preloader:
  enable: false
  source: 2
  pace_css_url:

enter_transitions: true

display_mode: light

beautify:
  enable: false
  field: post
  title_prefix_icon:
  title_prefix_icon_color:

font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

blog_title_font:
  font_link:
  font_family:

hr_icon:
  enable: true
  icon:
  icon_top:

# Background effects
activate_power_mode:
  enable: true
  colorful: true
  shake: true
  mobile: false

canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

canvas_fluttering_ribbon:
  enable: false
  mobile: false

canvas_nest:
  enable: true
  color: '0,200,255'
  opacity: 0.7
  zIndex: -1
  count: 99
  mobile: false

fireworks:
  enable: false
  zIndex: 9999
  mobile: false

click_heart:
  enable: false
  mobile: false

clickShowText:
  enable: true
  text:
    - Hi~
    - Welcome!
    - LINK START!
    - (*^▽^*)
    - Hello
  fontSize: 15px
  random: true
  mobile: false

# Lightbox Settings
# fancybox: 支持滚轮缩放 + 拖拽平移，适合查看长图/大图
lightbox: fancybox

# Tag Plugins settings
series:
  enable: false
  orderBy: 'title'
  order: 1
  number: true

note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0

# Other Settings
pjax:
  enable: true
  exclude:

aplayerInject:
  enable: true
  per_page: true

snackbar:
  enable: true
  position: top-right
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

instantpage: true

lazyload:
  enable: false
  native: false
  field: site
  placeholder:
  blur: false

pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

Open_Graph_meta:
  enable: true
  option:

structured_data:
  enable: false
  alternate_name:

css_prefix: true

# Inject custom css/js
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    # - <script src="/js/custom.js"></script>

# CDN Settings
CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: true
  custom_format:
  option:
